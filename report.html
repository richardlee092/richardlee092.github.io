---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title }}</h1>
    <p><strong>Date:</strong> {{ page.date | date: "%B %d, %Y" }}</p>
    <p><strong>Recommendation:</strong> {{ page.recommendation }}</p>
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
